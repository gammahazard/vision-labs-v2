# docker-compose.yml — Vision Labs (Phases 0-12)
#
# PURPOSE:
#   Runs the full Vision Labs stack on a single PC (RTX 3090):
#   Redis, camera ingester, YOLO pose detector, vehicle detector, tracker,
#   face recognizer, dashboard, Ollama (local LLM), ComfyUI, and recorder.
#
# USAGE:
#   docker compose up --build          # Start everything (first time)
#   docker compose up -d               # Start in background
#   docker compose logs -f             # Watch logs
#   docker compose down                # Stop everything
#
# NETWORK:
#   Camera ingester uses host networking to reach the camera at ${CAMERA_IP}.
#   All other services run on Docker bridge network and communicate via DNS names.
#   Redis is accessible at hostname "redis" from bridge-networked containers.
#
# DATA:
#   Redis data persisted in "redis-data" Docker volume (AOF enabled).
#   Face embeddings + photos persisted in "face-data" Docker volume (SQLite).
#   Stream is capped at MAX_STREAM_LEN frames to prevent unbounded memory growth.

services:

  # ---------------------------------------------------------------------------
  # Redis — Central message bus
  # ---------------------------------------------------------------------------
  # All services communicate through Redis Streams. This is the backbone
  # of the entire pipeline. Frames, detections, events, alerts — everything
  # flows through here.
  redis:
    image: redis:7-alpine
    ports:
      # Bind to 127.0.0.1 only — host-network services (camera-ingester,
      # recorder, prometheus) reach Redis at localhost:6379, internal-network
      # services use the `redis` hostname on the docker network. There is no
      # legitimate reason for a LAN device to talk to this Redis directly, so
      # we keep it off the LAN even if the user hasn't set REDIS_PASSWORD.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    # If REDIS_PASSWORD is set in .env, Redis demands AUTH from clients.
    # Empty by default for backward compat. Set a strong value in .env when
    # ready to enable — all Python clients honor it via contracts/redis_client.py.
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c "exec redis-server
      $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --auto-aof-rewrite-min-size 64mb"
    restart: unless-stopped
    healthcheck:
      # `redis-cli ping` returns NOAUTH when auth is required and no creds passed.
      # Use $REDIS_PASSWORD if set so the healthcheck is still meaningful.
      test:
        - "CMD-SHELL"
        - "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping; else redis-cli ping; fi"
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Camera Ingester — RTSP to Redis
  # ---------------------------------------------------------------------------
  # Reads the camera's RTSP sub-stream (640x480, low bandwidth),
  # encodes each frame as JPEG, and publishes to Redis Stream "frames:cam1".
  #
  # Uses network_mode: host so it can reach the camera on the LAN.
  # This means it also reaches Redis on localhost:6379 directly.
  # The primary camera slot is `cam1`. All 5 slots (cam1-cam5) are
  # profile-gated — services only start when their slot's profile is
  # active, which the orchestrator handles based on the cameras:registry
  # contents. No more "always-on primary" asymmetry.
  camera-ingester-cam1:
    build:
      context: ./services/camera-ingester
    network_mode: host
    profiles: ["cam1"]
    volumes:
      - ./contracts:/app/contracts:ro
    environment:
      - CAMERA_ID=cam1
      # RTSP URL comes from cameras:registry (set by the wizard or the
      # cameras tab). Power users can override with CAM1_RTSP_URL in .env.
      - RTSP_URL=${CAM1_RTSP_URL:-}
      - RTSP_MAIN=${CAM1_RTSP_MAIN:-}
      - REDIS_HOST=127.0.0.1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - TARGET_FPS=${TARGET_FPS:-15}
      - JPEG_QUALITY=75
      - HD_TARGET_FPS=8
      - HD_JPEG_QUALITY=70
      - MAX_STREAM_LEN=1000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Pose Detector — YOLO on GPU
  # ---------------------------------------------------------------------------
  # Reads frames from Redis, runs YOLOv8s-pose on the RTX 3090, publishes
  # bounding boxes + keypoints back to Redis. Uses NVIDIA Container Toolkit
  # for GPU access inside the container.
  #
  # First run downloads the YOLO model weights (~25 MB).
  pose-detector-cam1:
    build:
      context: ./services/pose-detector
    profiles: ["cam1"]
    environment:
      - CAMERA_ID=cam1
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - MODEL_NAME=${POSE_MODEL:-/models/yolov8s-pose.pt}
      - CONFIDENCE_THRESH=0.5
      - NVIDIA_VISIBLE_DEVICES=${DETECTOR_GPU:-0}
      - CUDA_VISIBLE_DEVICES=${DETECTOR_GPU:-0}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ./contracts:/app/contracts:ro
      - yolo-models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${DETECTOR_GPU:-0}']  # See .env (DETECTOR_GPU). Default 0 = first GPU
              capabilities: [ gpu ]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Tracker — Person ID Assignment + Event Publishing
  # ---------------------------------------------------------------------------
  # Lightweight CPU service. Reads detections, matches them across frames
  # using bounding box overlap (IoU), assigns persistent person IDs, and
  # publishes semantic events (person_appeared, person_left).
  tracker-cam1:
    build:
      context: ./services/tracker
    profiles: ["cam1"]
    environment:
      - CAMERA_ID=cam1
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - IOU_THRESHOLD=0.3
      - LOST_TIMEOUT=5.0
      - LOCATION_NAME=${LOCATION_NAME:-Default}
      - LOCATION_REGION=${LOCATION_REGION:-}
      - LOCATION_TIMEZONE=${LOCATION_TIMEZONE:-America/Toronto}
      - LOCATION_LAT=${LOCATION_LAT:-43.6532}
      - LOCATION_LON=${LOCATION_LON:--79.3832}
      - EMIT_VEHICLE_SAMPLES=${EMIT_VEHICLE_SAMPLES:-0}
      - SAMPLE_INTERVAL_FRAMES=${SAMPLE_INTERVAL_FRAMES:-3}
    volumes:
      - ./contracts:/app/contracts:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Face Recognizer — Known person identification
  # ---------------------------------------------------------------------------
  # Matches detected faces against a SQLite database of known people.
  # Enrollment API on port 8081 (proxied through dashboard).
  # InsightFace runs on GPU alongside the pose detector.
  face-recognizer-cam1:
    build:
      context: ./services/face-recognizer
    profiles: ["cam1"]
    # NOTE: port 8081 deliberately NOT exposed on host — the dashboard proxies
    # all face-recognizer requests via Docker DNS (`http://face-recognizer-cam1:8081`),
    # so there's no reason for it to be reachable from outside the bridge net.
    # Exposing it would let any LAN client enroll/delete faces without auth.
    expose:
      - "8081"
    environment:
      - CAMERA_ID=cam1
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - DB_PATH=/data/faces.db
      - MATCH_THRESHOLD=0.5
      - API_PORT=8081
      - NVIDIA_VISIBLE_DEVICES=${DETECTOR_GPU:-0}
      - CUDA_VISIBLE_DEVICES=${DETECTOR_GPU:-0}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ./contracts:/app/contracts:ro
      - face-data:/data
      - insightface-models:/root/.insightface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${DETECTOR_GPU:-0}']  # See .env (DETECTOR_GPU). Default 0 = first GPU
              capabilities: [ gpu ]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Vehicle Detector — YOLOv8 vehicle detection (Phase 6.2)
  # ---------------------------------------------------------------------------
  # Detects vehicles (car, truck, bus, motorcycle) in camera frames.
  # Reads the same frame stream as pose-detector but outputs to a separate
  # vehicle detection stream for the tracker to consume.
  vehicle-detector-cam1:
    build:
      context: ./services/vehicle-detector
    profiles: ["cam1"]
    environment:
      - CAMERA_ID=cam1
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - MODEL_NAME=${VEHICLE_MODEL:-/models/yolov8s.pt}
      - CONFIDENCE_THRESH=0.35
      - FRAME_SKIP=1
      - NVIDIA_VISIBLE_DEVICES=${DETECTOR_GPU:-0}
      - CUDA_VISIBLE_DEVICES=${DETECTOR_GPU:-0}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ./contracts:/app/contracts:ro
      - yolo-models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${DETECTOR_GPU:-0}']  # See .env (DETECTOR_GPU). Default 0 = first GPU
              capabilities: [ gpu ]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  vehicle-attributes-cam1:
    build:
      context: ./services/vehicle-attributes
    profiles: ["cam1"]
    environment:
      - CAMERA_ID=cam1
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - SNAPSHOT_ROOT=/data/snapshots/vehicles
      - SAMPLE_INTERVAL_FRAMES=${SAMPLE_INTERVAL_FRAMES:-3}
      - MAX_BUFFER_CROPS=${MAX_BUFFER_CROPS:-8}
      - MIN_CROP_AREA_HD_PX=${MIN_CROP_AREA_HD_PX:-2500}
      - CROP_PADDING_PCT=${CROP_PADDING_PCT:-0.35}
      - JPEG_QUALITY=${JPEG_QUALITY:-85}
      - HD_FRAME_WIDTH=${HD_FRAME_WIDTH:-2304}
      - HD_FRAME_HEIGHT=${HD_FRAME_HEIGHT:-1296}
      - LOCATION_TIMEZONE=${LOCATION_TIMEZONE:-America/Toronto}
      - TZ=${LOCATION_TIMEZONE:-America/Toronto}
      # Phase 3 classifier — disabled by default until weights exist on HF Hub
      - ENABLE_CLASSIFIER=${ENABLE_CLASSIFIER:-0}
      - VEHICLE_ATTR_HF_REPO=${VEHICLE_ATTR_HF_REPO:-mangolover/vision-labs-vehicle-attributes}
      - VEHICLE_ATTR_MODEL=${VEHICLE_ATTR_MODEL:-convnext_tiny_v0}
      - VEHICLE_ATTR_MODELS_DIR=/models
      - COLOR_CONF_THRESHOLD=${COLOR_CONF_THRESHOLD:-0.45}
      - BODY_CONF_THRESHOLD=${BODY_CONF_THRESHOLD:-0.50}
      - MAKE_CONF_THRESHOLD=${MAKE_CONF_THRESHOLD:-0.65}
      - MODEL_CONF_THRESHOLD=${MODEL_CONF_THRESHOLD:-0.55}
      - DETECTOR_GPU=${DETECTOR_GPU:-0}
      - CUDA_VISIBLE_DEVICES=${DETECTOR_GPU:-0}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ./contracts:/app/contracts:ro
      - ./:/workspace:ro
      - qnap-snapshots:/data/snapshots
      - vehicle-attribute-models:/models
    depends_on:
      redis:
        condition: service_healthy
      tracker-cam1:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${DETECTOR_GPU:-0}']
              capabilities: [gpu]
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Ollama — Local LLM inference (Qwen 3 14B)
  # ---------------------------------------------------------------------------
  # Runs the Ollama model server with GPU access. The model weights are
  # downloaded on first startup (~9.3 GB) and cached in a Docker volume.
  # Dashboard routes AI chat requests to http://ollama:11434.
  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - NVIDIA_VISIBLE_DEVICES=${CHAT_GPU:-0}
      - CUDA_VISIBLE_DEVICES=${CHAT_GPU:-0}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${CHAT_GPU:-0}']  # See .env (CHAT_GPU). Default 0 = same as detectors (single-GPU)
              capabilities: [ gpu ]
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Dashboard — Live monitoring UI
  # ---------------------------------------------------------------------------
  # Web dashboard accessible at http://localhost:8080. Shows live camera feed
  # with detection overlays, adjustable settings (confidence, IoU, lost timeout),
  # event feed, and face enrollment UI.
  dashboard:
    build:
      context: ./services/dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./contracts:/app/contracts:ro
      # Bind-mount the frontend so UI edits (HTML/CSS/JS) go live on browser
      # refresh — without this, every static change needs a `docker compose
      # build dashboard` round trip. The image still COPYs static/ in for
      # builds-from-scratch; this mount just shadows it during runtime.
      - ./services/dashboard/static:/app/static:ro
      # Bind-mount Python source too so backend changes only need a `docker
      # compose restart dashboard` (no rebuild). uvicorn doesn't auto-reload
      # so we still need the restart, but it's ~5s vs ~1min for a rebuild.
      - ./services/dashboard/routes:/app/routes:ro
      - ./services/dashboard/pollers:/app/pollers:ro
      - ./services/dashboard/helpers:/app/helpers:ro
      - ./services/dashboard/server.py:/app/server.py:ro
      - ./services/dashboard/cameras.py:/app/cameras.py:ro
      - ./services/dashboard/websocket.py:/app/websocket.py:ro
      - ./services/dashboard/ai_db.py:/app/ai_db.py:ro
      - ./services/dashboard/constants.py:/app/constants.py:ro
      - ./services/dashboard/event_renderer.py:/app/event_renderer.py:ro
      # .env is bind-mounted RW so the setup wizard can persist the user's
      # chosen GPU/tier/model selections without the user having to edit
      # the file by hand. The dashboard only writes known keys (see
      # helpers/env_writer.py); it never reads arbitrary host files.
      - ./.env:/app/.env:rw
      - auth-data:/data
      - qnap-snapshots:/data/snapshots
      - qnap-events:/data/events
      - qnap-telegram:/data/telegram
      - qnap-videos:/data/videos
      - qnap-clips:/data/clips
      # Bind mount: recordings live on the WSL host so you can browse them
      # from Windows Explorer (\\wsl$\<distro>\home\mongo\projects\vision-labs\data\recordings)
      # without sudo. Other volumes stay as Docker-managed for now.
      - ./data/recordings:/data/recordings:ro
    environment:
      # The dashboard no longer has a hardcoded "primary camera". All slots
      # (cam1-cam5) are treated equally. UI features that needed a primary
      # default (live view "first camera") now read from the cameras:registry
      # at request time.
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - DASHBOARD_PORT=8080
      # Dashboard proxies face-enrollment requests to cam1's face-recognizer.
      # On a fresh install with no cam1 configured, enrollment endpoints
      # return 503 — you can't enroll a face without a camera anyway.
      - FACE_API_URL=http://face-recognizer-cam1:8081
      - AUTH_DB_PATH=/data/auth.db
      - OLLAMA_HOST=http://ollama:11434
      # AI model configuration (see .env / tiers/*.env). Empty CHAT_MODEL
      # disables the AI chat tab and skips the ollama warmup poller. Empty
      # VISION_MODEL disables the vision LLM image-analysis features.
      - OLLAMA_CHAT_MODEL=${CHAT_MODEL-qwen3:14b}
      - OLLAMA_VISION_MODEL=${VISION_MODEL-minicpm-v}

      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - LOCATION_NAME=${LOCATION_NAME:-Default}
      - LOCATION_REGION=${LOCATION_REGION:-}
      - LOCATION_TIMEZONE=${LOCATION_TIMEZONE:-America/Toronto}
      - LOCATION_LAT=${LOCATION_LAT:-43.6532}
      - LOCATION_LON=${LOCATION_LON:--79.3832}
      # Retention values surface in the DVR tab via /api/conditions and gate
      # the dashboard's retention_poller (which prunes /data/snapshots + the
      # clips dirs). Before these were passed through, os.getenv fell back to
      # hardcoded defaults (28/4/3) and the DVR tab always showed those —
      # so user-set values in .env never reached the UI nor the prune loop.
      - RETENTION_DAYS=${RETENTION_DAYS:-7}
      - SNAPSHOT_RETENTION_DAYS=${SNAPSHOT_RETENTION_DAYS:-4}
      - CLIP_RETENTION_DAYS=${CLIP_RETENTION_DAYS:-3}
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Recorders — Continuous DVR (per-camera, local disk for now)
  # ---------------------------------------------------------------------------
  # One recorder service per camera. Each records the camera's RTSP sub-stream
  # directly to 1-hour MPEG-TS segments via ffmpeg copy (no transcode).
  # Storage layout:
  #   /recordings/{camera_id}/YYYY-MM-DD/HH-MM.ts
  # Retention defaults to 7d (override in .env via Settings panel).
  # When the QNAP arrives, change the `qnap-recordings` volume to an NFS mount
  # and bump RETENTION_DAYS — no code changes needed.
  recorder-cam1:
    build:
      context: ./services/recorder
    network_mode: host
    profiles: ["cam1"]
    volumes:
      - ./data/recordings:/recordings
      - ./contracts:/app/contracts:ro
    environment:
      - CAMERA_ID=cam1
      # RTSP URL comes from cameras:registry. Power users override via env.
      - RTSP_URL=${CAM1_RTSP_URL:-}
      # Host-network container — must use 127.0.0.1 to reach Redis on
      # the published host port. Without this the registry-fallback for
      # RTSP_URL fails and the recorder crash-loops with "RTSP_URL not set".
      - REDIS_HOST=127.0.0.1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - RECORDING_DIR=/recordings
      - SEGMENT_DURATION=3600
      # Read from .env (falls back to 7d if unset). The Settings panel writes
      # this key into .env via /api/setup/apply-config, then the orchestrator
      # force-recreates the recorder so this interpolation picks up the new
      # value at container start. Previously hardcoded to 3 — that meant the
      # Settings panel's retention slider had no effect on the running recorder.
      - RETENTION_DAYS=${RETENTION_DAYS:-7}
      - LOCATION_TIMEZONE=${LOCATION_TIMEZONE:-America/Toronto}
      - TZ=${LOCATION_TIMEZONE:-America/Toronto}
    restart: unless-stopped

  # cam2 (basement Pi + C922) — RTSP from mediamtx on the Pi.
  # Profile-gated to "cam2" so it only runs when the slot is active.
  recorder-cam2:
    build:
      context: ./services/recorder
    network_mode: host
    profiles: ["cam2"]
    volumes:
      - ./data/recordings:/recordings
      - ./contracts:/app/contracts:ro
    environment:
      - CAMERA_ID=cam2
      - RTSP_URL=${CAM2_RTSP_URL:-}
      # Host-network container — must use 127.0.0.1 to reach Redis.
      - REDIS_HOST=127.0.0.1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - RECORDING_DIR=/recordings
      - SEGMENT_DURATION=3600
      # Read from .env (falls back to 7d if unset). The Settings panel writes
      # this key into .env via /api/setup/apply-config, then the orchestrator
      # force-recreates the recorder so this interpolation picks up the new
      # value at container start. Previously hardcoded to 3 — that meant the
      # Settings panel's retention slider had no effect on the running recorder.
      - RETENTION_DAYS=${RETENTION_DAYS:-7}
      - LOCATION_TIMEZONE=${LOCATION_TIMEZONE:-America/Toronto}
      - TZ=${LOCATION_TIMEZONE:-America/Toronto}
    restart: unless-stopped

  # ─── Monitoring Stack ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    network_mode: host
    volumes:
      - prometheus-data:/prometheus
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      # Storage size cap as a belt-and-braces alongside retention.time —
      # series cardinality x time can blow up disk faster than 30d
      # implies. 5 GB is plenty for our ~500 active series.
      - "--storage.tsdb.retention.size=5GB"
      # Bind explicitly to 127.0.0.1. Without this, on `network_mode: host`
      # we'd listen on every interface (including the LAN), and combined
      # with `--web.enable-admin-api` below, anyone on the local network
      # could `DELETE /api/v1/admin/tsdb/delete_series` and wipe metrics.
      - "--web.listen-address=127.0.0.1:9090"
      # Admin API enables the tombstone/delete endpoints used by
      # scripts/prometheus-clean-stale-cameras.sh. Safe to enable now
      # that we're bound to localhost only.
      - "--web.enable-admin-api"
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    network_mode: host
    volumes:
      - grafana-data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=visionlabs
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_USERS_ALLOW_SIGN_UP=false
      # Two TZ vars do two different things:
      #   TZ                                  — the container OS clock, so
      #                                         Grafana logs + file mtimes
      #                                         match the user's wall clock.
      #   GF_DATE_FORMATS_DEFAULT_TIMEZONE    — Grafana's default UI timezone
      #                                         for rendering timestamps. Users
      #                                         can override per-dashboard, but
      #                                         this controls the out-of-box
      #                                         view (prevents the "everything
      #                                         is 4h off in the panels" surprise).
      # Both are interpolated from .env via the same LOCATION_TIMEZONE that
      # the dashboard + tracker + recorder use. Default Toronto on a fresh
      # install — operator changes via Settings panel propagate here on the
      # next force-recreate (see services/dashboard/routes/setup.py).
      - TZ=${LOCATION_TIMEZONE:-America/Toronto}
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=${LOCATION_TIMEZONE:-America/Toronto}
    depends_on:
      - prometheus
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    network_mode: host
    environment:
      - REDIS_ADDR=redis://127.0.0.1:6379
      # Auth — empty default = no auth (matches current Redis config).
      # When REDIS_PASSWORD is set, exporter authenticates so metrics keep flowing.
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      - redis
    restart: unless-stopped

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all  # both GPUs — exporter scrapes metrics from all cards
              capabilities: [ gpu ]
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped

  # Host-level metrics: disk usage, memory, CPU, load, network. The
  # recordings directory grows quickly with active cameras; this is how
  # we'll see disk-full coming before it bites. Bound to 127.0.0.1 so
  # the LAN can't enumerate filesystems / mountpoints.
  node-exporter:
    image: prom/node-exporter:latest
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # WSL2 doesn't mark / as shared/slave by default, so we can't use
      # rslave propagation here. Plain `:ro` works — for our use case
      # (watching the recordings dir which lives on the same FS as /)
      # it's enough; we don't need new mounts to propagate in.
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run/credentials|var/lib/docker)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$"
      - "--web.listen-address=127.0.0.1:9100"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Portainer — Docker management UI (replaces Docker Desktop dashboard)
  # ---------------------------------------------------------------------------
  # HTTPS UI at https://localhost:9443 — first visit creates the admin user.
  # Mounts the Docker socket so it can manage everything on this host.
  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped

  # ===========================================================================
  # Camera slot: cam2 (Phase 7c)
  # ===========================================================================
  # A pre-defined second-camera slot. Activate by:
  #   1. Register a camera with id="cam2" via the dashboard (cameras.html)
  #   2. Run: `docker compose --profile cam2 up -d`
  # The ingester pulls the RTSP URLs from cameras:registry at startup.
  # Detectors check the camera's detect_persons/vehicles/faces flags and
  # exit cleanly if disabled (so unchecking "Vehicles" in the UI saves GPU).
  # For cam3/cam4: duplicate this block with `cam2` replaced.

  camera-ingester-cam2:
    build:
      context: ./services/camera-ingester
    network_mode: host
    profiles: ["cam2"]
    environment:
      - CAMERA_ID=cam2
      - REDIS_HOST=127.0.0.1
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - TARGET_FPS=15
      - JPEG_QUALITY=75
      - HD_TARGET_FPS=8
      - HD_JPEG_QUALITY=70
      - MAX_STREAM_LEN=1000
    volumes:
      - ./contracts:/app/contracts:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  pose-detector-cam2:
    build:
      context: ./services/pose-detector
    profiles: ["cam2"]
    environment:
      - CAMERA_ID=cam2
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - MODEL_NAME=/models/yolov8s-pose.pt
      - CONFIDENCE_THRESH=0.5
      - NVIDIA_VISIBLE_DEVICES=${DETECTOR_GPU:-0}
      - CUDA_VISIBLE_DEVICES=${DETECTOR_GPU:-0}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ./contracts:/app/contracts:ro
      - yolo-models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${DETECTOR_GPU:-0}']
              capabilities: [ gpu ]
    depends_on:
      redis:
        condition: service_healthy
    # on-failure (not unless-stopped) so a clean exit from the detect_X flag
    # check actually stays exited and doesn't restart-loop.
    restart: on-failure

