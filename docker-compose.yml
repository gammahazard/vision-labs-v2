      - insightface-models:/root/.insightface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${DETECTOR_GPU:-0}']
              capabilities: [ gpu ]
    depends_on: { redis: { condition: service_healthy } }
    restart: on-failure

  tracker-cam20:
    build: { context: ./services/tracker }
    profiles: ["cam20"]
    environment:
      - CAMERA_ID=cam20
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - IOU_THRESHOLD=0.3
      - LOST_TIMEOUT=5.0
      - LOCATION_NAME=${LOCATION_NAME:-Default}
      - LOCATION_REGION=${LOCATION_REGION:-}
      - LOCATION_TIMEZONE=${LOCATION_TIMEZONE:-America/Toronto}
      - LOCATION_LAT=${LOCATION_LAT:-43.6532}
      - LOCATION_LON=${LOCATION_LON:--79.3832}
      - EMIT_VEHICLE_SAMPLES=${EMIT_VEHICLE_SAMPLES:-0}
      - SAMPLE_INTERVAL_FRAMES=${SAMPLE_INTERVAL_FRAMES:-3}
    volumes: [ "./contracts:/app/contracts:ro" ]
    depends_on: { redis: { condition: service_healthy } }
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Orchestrator — reconciles compose profiles against cameras:registry.
  # Single-purpose sidecar; intentionally tiny attack surface (no HTTP, no
  # auth flows). Has the Docker socket so it can `docker compose up/down`
  # the cam2..cam5 profiles, but the dashboard does NOT — see Phase 7b in
  # PHASES.md and the decision log in REFACTOR_PLAN.md.
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./services/orchestrator
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - COMPOSE_PROJECT_NAME=vision-labs
      # Compose uses --project-directory for resolving relative build
      # contexts. Set to the host's project path so the host Docker daemon
      # can find ./services/* even though commands are issued from inside
      # the orchestrator container.
      - HOST_PROJECT_DIR=${PWD}
      # PWD is referenced in the compose file (${PWD}:${PWD}:ro on the
      # orchestrator's own volumes). When this orchestrator's inner
      # compose CLI re-parses the file, it expands ${PWD} from its own
      # process environment — pass through the host's PWD here so the
      # expansion matches and the spec stays valid.
      - PWD=${PWD}
      - ALLOWED_PROFILES=cam1,cam2,cam3,cam4,cam5,cam6,cam7,cam8,cam9,cam10,cam11,cam12,cam13,cam14,cam15,cam16,cam17,cam18,cam19,cam20
      - RECONCILE_INTERVAL=10
      # Comma-separated extra compose files to layer on every compose call.
      # install-linux.sh writes this to .env as "/workspace/docker-compose.registry.yml"
      # on a --pull install so cam2-cam20 keep pulling images instead of trying
      # to build locally. Empty by default (local-build installs).
      - EXTRA_COMPOSE_FILES=${EXTRA_COMPOSE_FILES:-}
      # Pin the image tag for slot services brought up after install. Defaults
      # to the same value the registry overlay resolves to; harmless when set
      # on a local-build install (the overlay is just not loaded then).
      - IMAGE_TAG=${IMAGE_TAG:-latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the project dir read-only so the compose CLI can read the
      # compose file. Resolution of build-context paths is done against
      # HOST_PROJECT_DIR (above), not this mount point.
      - ./:/workspace:ro
      # Docker-in-Docker quirk: when compose runs `build`/`up` inside this
      # container, the CLI verifies the build context path EXISTS at the
      # absolute path it sends to the daemon (otherwise: "unable to prepare
      # context: path /your/checkout/... not found"). The path needs to exist
      # inside this container at the same string the host daemon uses too.
      # Mounting the project dir at its host path satisfies both.
      - ${PWD}:${PWD}:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  face-data:
  yolo-models:
  insightface-models:
  auth-data:
  ollama-models:

  prometheus-data:
  grafana-data:
  portainer-data:

  # Storage volumes (local by default — overridden to CIFS via docker-compose.qnap.yml)
  # See docker-compose.qnap.yml for the QNAP/CIFS-backed versions of these.
  # qnap-recordings is no longer a named volume — recordings are bind-mounted
  # to ./data/recordings on the WSL host for easy Windows Explorer access.
  vehicle-attribute-models:
  qnap-snapshots:
  qnap-events:
  qnap-telegram:
  qnap-videos:
  qnap-clips:
