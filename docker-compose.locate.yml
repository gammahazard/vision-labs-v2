# ---------------------------------------------------------------------------
# OPT-IN overlay: open-vocabulary visual grounding (nvidia/LocateAnything-3B).
# ---------------------------------------------------------------------------
# This is NOT part of the default stack and is NOT published to GHCR. Enable it
# explicitly and locally:
#
#   docker compose -f docker-compose.yml -f docker-compose.locate.yml up -d \
#       locate-anything dashboard
#
# LICENSE: LocateAnything-3B is under the NVIDIA License — NON-COMMERCIAL /
# research use only. This overlay ships only our service code; the model
# weights lazy-download from HF Hub at runtime into the locate-models volume,
# so YOU fetch them and accept NVIDIA's license. Do not enable this for
# commercial use. See https://huggingface.co/nvidia/LocateAnything-3B.
#
# GPU: set LOCATE_GPU in .env (default 0). On a dual-GPU rig, point it at the
# card with headroom (the model needs ~8 GB).
services:
  locate-anything:
    build:
      context: ./services/locate-anything
    image: vision-labs-locate-anything:latest
    environment:
      - LOCATE_GEN_MODE=${LOCATE_GEN_MODE:-slow}
      - LOCATE_MAX_DIM=${LOCATE_MAX_DIM:-1536}
      - HF_HOME=/models
    volumes:
      - locate-models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${LOCATE_GPU:-0}']
              capabilities: [gpu]
    restart: unless-stopped

  # Inject the feature flag + service URL into the dashboard. The AI-tab
  # "Locate" option only appears when ENABLE_LOCATE=1.
  dashboard:
    environment:
      - ENABLE_LOCATE=1
      - LOCATE_API_URL=http://locate-anything:8082

volumes:
  locate-models:
