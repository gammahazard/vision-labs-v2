<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vision Labs — Camera Grid</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-tile: #111827;
            --bg-tile-hover: #1a2235;
            --border: #2d3748;
            --border-hover: #4ade80;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #4ade80;
            --danger: #ef4444;
            --warning: #fbbf24;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100svh; /* iOS safe area */
        }

        /* ---- Top nav ---- */
        .topbar {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 10;
        }
        .topbar h1 {
            font-size: 1rem; font-weight: 600; flex: 1;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .topbar h1 span { font-size: 1.15rem; }
        .topbar a {
            color: var(--text-secondary); text-decoration: none;
            font-size: 0.85rem; padding: 0.4rem 0.7rem; border-radius: 6px;
            transition: all 0.15s;
        }
        .topbar a:hover { background: var(--bg-tile); color: var(--text-primary); }
        .topbar a.active { background: var(--bg-tile); color: var(--accent); }
        .topbar-nav { display: flex; gap: 0.25rem; }

        /* ---- Grid ---- */
        .grid {
            display: grid;
            grid-template-columns: 1fr;  /* mobile default = stack */
            gap: 0.75rem;
            padding: 0.75rem;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* Tablet: 2 columns */
        @media (min-width: 640px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; padding: 1rem; }
        }
        /* Desktop: 2-3 columns based on count */
        @media (min-width: 1100px) {
            .grid.cams-3-plus { grid-template-columns: repeat(3, 1fr); }
        }
        /* Big screens: up to 4 columns */
        @media (min-width: 1600px) {
            .grid.cams-5-plus { grid-template-columns: repeat(4, 1fr); }
        }

        /* ---- Camera tile ---- */
        .tile {
            background: var(--bg-tile);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            display: flex; flex-direction: column;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.15s;
            position: relative;
        }
        .tile:hover, .tile:focus-visible { border-color: var(--border-hover); }
        .tile:active { transform: scale(0.997); }
        .tile.alert { animation: pulse-alert 1.5s ease-in-out; }
        @keyframes pulse-alert {
            0%, 100% { border-color: var(--border); }
            50% { border-color: var(--warning); box-shadow: 0 0 16px rgba(251,191,36,0.35); }
        }

        .tile-feed {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
        }
        .tile-feed img {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }
        .tile-feed .placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.85rem;
        }

        .tile-overlay {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 0.5rem 0.75rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
            display: flex; align-items: center; gap: 0.5rem;
            pointer-events: none;
        }
        .tile-status-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .tile-status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .tile-status-dot.stale { background: var(--warning); }
        .tile-status-dot.offline { background: var(--danger); }

        .tile-name {
            font-size: 0.85rem; font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.7);
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .tile-badge {
            font-size: 0.7rem; padding: 0.15rem 0.5rem;
            border-radius: 12px;
            background: rgba(0,0,0,0.55);
            color: var(--text-primary);
            font-weight: 500;
        }
        .tile-badge.has-people { background: rgba(74,222,128,0.85); color: #0a0e17; }

        .tile-footer {
            padding: 0.5rem 0.75rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex; justify-content: space-between; gap: 0.5rem;
            min-height: 1.7rem;
        }
        .tile-footer .meta { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ---- Empty state ---- */
        .empty {
            grid-column: 1 / -1;
            padding: 4rem 1rem;
            text-align: center;
            color: var(--text-muted);
        }
        .empty a { color: var(--accent); text-decoration: none; }
        .empty a:hover { text-decoration: underline; }

        /* ---- Modal (full-screen camera view) ---- */
        .modal {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center; justify-content: center;
            padding: 0;
        }
        .modal.open { display: flex; }
        .modal-content {
            width: 100%; height: 100%;
            max-width: 1600px;
            display: flex; flex-direction: column;
        }
        .modal-header {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
        }
        .modal-title { flex: 1; font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .modal-close {
            background: rgba(255,255,255,0.1); border: none;
            color: var(--text-primary); cursor: pointer;
            padding: 0.4rem 0.8rem; border-radius: 6px;
            font-size: 0.85rem; font-family: inherit;
        }
        .modal-close:hover { background: rgba(255,255,255,0.2); }
        .modal-feed {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            background: #000;
            position: relative;
        }
        .modal-feed img {
            max-width: 100%; max-height: 100%;
            display: block;
        }
        .modal-footer {
            padding: 0.5rem 1rem;
            background: rgba(0,0,0,0.55);
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex; gap: 1rem; flex-wrap: wrap;
        }
        .modal-footer a {
            color: var(--accent); text-decoration: none;
        }

        /* Mobile: tighter spacing, full-screen modal */
        @media (max-width: 639px) {
            .topbar { padding: 0.5rem 0.75rem; gap: 0.5rem; }
            .topbar h1 { font-size: 0.95rem; }
            .topbar a { padding: 0.3rem 0.5rem; font-size: 0.8rem; }
            .grid { padding: 0.5rem; gap: 0.5rem; }
            .tile-overlay { padding: 0.4rem 0.6rem; }
            .tile-name { font-size: 0.8rem; }
            .tile-footer { font-size: 0.65rem; padding: 0.4rem 0.6rem; }
            .modal-header { padding: env(safe-area-inset-top, 0.5rem) 0.75rem 0.5rem; }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <h1><span>🏠</span> Home</h1>
        <nav class="topbar-nav">
            <a href="/" class="active" title="All cameras at a glance">🏠 Home</a>
            <a href="/single.html" title="Single-camera detailed view">Detail view</a>
            <a href="/cameras.html" title="Manage cameras">📹 Cameras</a>
            <a href="/ai.html" title="AI assistant">🤖 AI</a>
            <a href="/telegram.html" title="Telegram">🔐 Telegram</a>
            <a href="/monitoring.html" title="System monitoring">📊 Monitoring</a>
        </nav>
    </div>

    <div class="grid" id="grid">
        <div class="empty">Loading cameras...</div>
    </div>

    <!-- Full-screen camera modal -->
    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <button class="modal-close" onclick="closeModal()">← Back to grid</button>
                <div class="modal-title" id="modalTitle">—</div>
            </div>
            <div class="modal-feed">
                <img id="modalImg" alt="Live feed" />
            </div>
            <div class="modal-footer">
                <span id="modalStatus">connecting...</span>
                <span id="modalFps">— FPS</span>
                <a id="modalSingleLink" href="/">Open full controls →</a>
            </div>
        </div>
    </div>

    <script src="grid.js"></script>
</body>

</html>
