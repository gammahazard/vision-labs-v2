# Auto-provision Prometheus as the default Grafana data source.
# Grafana reads this on first boot — no manual setup needed.
#
# NOTE: Uses localhost:9090 because both Prometheus and Grafana
#       use network_mode: host in docker-compose.yml.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: true
