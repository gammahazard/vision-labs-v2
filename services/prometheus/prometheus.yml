# services/prometheus/prometheus.yml — Prometheus scrape configuration
#
# PURPOSE:
#   Defines what endpoints Prometheus pulls metrics from.
#   Scrapes the dashboard app, Redis exporter, and DCGM GPU exporter.
#
# NOTE:
#   Prometheus + redis-exporter + dcgm-exporter run on network_mode: host
#   so localhost reaches them directly. The dashboard is on bridge net but
#   publishes port 8080 on the host, so localhost:8080 also works.
#
# USAGE:
#   Mounted into the Prometheus container by docker-compose.yml.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Dashboard application metrics (detections, events, GPU pause, notifications)
  - job_name: "dashboard"
    static_configs:
      - targets: ["localhost:8080"]
    metrics_path: "/metrics"

  # Redis health metrics (memory, clients, commands/sec, stream lengths)
  - job_name: "redis"
    static_configs:
      - targets: ["localhost:9121"]

  # NVIDIA GPU metrics (VRAM usage, utilization, temperature, power)
  - job_name: "gpu"
    static_configs:
      - targets: ["localhost:9400"]

  # Host-level metrics — disk usage (recordings dir!), memory, CPU,
  # load avg, network throughput.
  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]
