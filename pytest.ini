[pytest]
# Vision Labs test configuration.
#
# `pythonpath` lets test files import from the source tree (services/dashboard,
# services/tracker, services/face-recognizer, contracts/) without per-test
# sys.path hacks. Aligns with how each container runs at /app where the
# package's working directory is the import root.
testpaths = tests
pythonpath =
    .
    services/dashboard
    services/face-recognizer
    services/tracker

# Custom markers (suppress unknown-marker warnings).
markers =
    stale: test was written for pre-refactor behavior; needs rewrite — skipped by default
    integration: requires Redis / a live stack — skipped by default
    slow: takes >1s

# Skip stale + integration tests by default. Run them explicitly with:
#   pytest -m stale       # see what's marked for rewrite
#   pytest -m integration # requires the stack to be up
addopts = -m "not stale and not integration" --tb=short --color=yes

# Suppressed warnings. Each entry must include a comment explaining WHY +
# WHEN to drop it. Don't add catch-alls — be specific.
filterwarnings =
    # Upstream: starlette/formparsers.py uses `import multipart` while the
    # package has been renamed to `python_multipart`. Fixed in starlette
    # >=0.45, which ships in fastapi >=0.116. Drop this filter when
    # services/dashboard/requirements.txt is bumped past fastapi 0.115.
    ignore::PendingDeprecationWarning:starlette.formparsers
